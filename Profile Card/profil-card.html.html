<!DOCTYPE html>
<html>
<head>
  <title>Profile Card</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #7c6fe0;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 320px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .top {
      background: #eef0fb;
      padding: 30px 20px 20px;
      text-align: center;
    }

    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 5px solid #2d2f6b;
      object-fit: cover;
    }

    .bottom {
      background: #2d2f6b;
      padding: 20px;
      color: white;
      text-align: center;
    }

    .name {
      font-size: 20px;
      font-weight: bold;
      margin: 0 0 10px;
    }

    .location {
      font-size: 13px;
      color: #aab0d6;
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .bio {
      font-size: 13px;
      color: #c5c9e8;
      margin-bottom: 16px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .btn {
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      background: #3d3f8f;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.15);
      margin-bottom: 14px;
    }

    .skills-title {
      text-align: left;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      text-align: left;
      font-size: 13px;
      color: #c5c9e8;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="top">
    <img class="avatar" src="picture.jpg" alt="Profile Photo"/>
  </div>
  <div class="bottom">
    <p class="name">Zainab Kinza Sheikh</p>

    <p class="location">📍 KARACHI</p>

    <p class="bio">2nd Semester CSIT Student | C · C++ · Python</p>

    <div class="buttons">
      <button class="btn">Message</button>
      <button class="btn">Follow</button>
    </div>
    <hr/>
    <p class="skills-title">SKILLS</p>

    <div class="skills">
      <span>C</span>
      <span>C++</span>
      <span>Python</span>
      <span>Problem Solving</span>
      <span>IT Fundamentals and Applications</span>
    </div>
  </div>
</div>

</body>
</html>
